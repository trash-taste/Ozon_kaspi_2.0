services:
  bot:
    build:
      context: .
    container_name: ozon-bot
    restart: unless-stopped
    init: true
    shm_size: "2gb"
    stop_grace_period: 30s
    environment:
      TZ: Asia/Qyzylorda
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      PYTHONUNBUFFERED: "1"
      OZON_PAGE_LOAD_TIMEOUT: "30"
      OZON_ANTIBOT_TIMEOUT: "45"
      OZON_PRODUCT_PAGE_FALLBACK: "0"
      OZON_PRODUCT_WORKERS: "2"
      OZON_SELLER_WORKERS: "2"
      KASPI_REQUEST_TIMEOUT: "12"
      KASPI_COMPARE_TIMEOUT: "180"
      INTERNET_REQUEST_TIMEOUT: "15"
      INTERNET_PRODUCT_TIMEOUT: "60"
      INTERNET_PRODUCT_CONCURRENCY: "2"
    volumes:
      - ./config.txt:/app/config.txt
      - ./output:/app/output
      - ./reports:/app/reports
      - ./logs:/app/logs
