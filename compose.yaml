services:
  bot:
    build:
      context: .
    container_name: ozon-bot
    restart: unless-stopped
    init: true
    stop_grace_period: 30s
    command: ["python", "-u", "bot.py"]
    environment:
      TZ: Asia/Qyzylorda
      PYTHONUNBUFFERED: "1"
      APP_MANAGER_MODE: "queue"
      PARSER_RUNTIME_DIR: /app/runtime
    volumes:
      - ./config.txt:/app/config.txt
      - ./output:/app/output
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./runtime:/app/runtime

  parser-worker:
    build:
      context: .
    container_name: ozon-parser-worker
    restart: unless-stopped
    init: true
    shm_size: "2gb"
    stop_grace_period: 60s
    command: ["python", "-u", "worker.py"]
    environment:
      TZ: Asia/Qyzylorda
      CHROME_BIN: /usr/bin/chromium
      CHROMEDRIVER_PATH: /usr/bin/chromedriver
      PYTHONUNBUFFERED: "1"
      PARSER_RUNTIME_DIR: /app/runtime
      OZON_LINK_PARSER: "selenium"
      OZON_PRODUCT_PARSER: "selenium"
      OZON_PAGE_LOAD_TIMEOUT: "30"
      OZON_ANTIBOT_TIMEOUT: "45"
      OZON_PLAYWRIGHT_TIMEOUT: "15000"
      OZON_PLAYWRIGHT_NAV_TIMEOUT: "25000"
      OZON_PRODUCT_PAGE_MODE: "always"
      OZON_PRODUCT_WORKERS: "2"
      OZON_SELLER_WORKERS: "2"
      KASPI_REQUEST_TIMEOUT: "12"
      KASPI_COMPARE_TIMEOUT: "180"
      INTERNET_REQUEST_TIMEOUT: "15"
      INTERNET_PRODUCT_TIMEOUT: "60"
      INTERNET_PRODUCT_CONCURRENCY: "2"
      INTERNET_PAGE_CONCURRENCY: "2"
      INTERNET_USE_KASPI_FALLBACK: "0"
    volumes:
      - ./config.txt:/app/config.txt
      - ./output:/app/output
      - ./reports:/app/reports
      - ./logs:/app/logs
      - ./runtime:/app/runtime
